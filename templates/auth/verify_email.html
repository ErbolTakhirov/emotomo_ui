{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подтверждение Email - EmoTomo</title>
  <link rel="stylesheet" href="{% static 'style.css' %}">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { background: rgba(18, 20, 28, 0.85); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 40px; max-width: 450px; width: 100%; backdrop-filter: blur(12px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }
    .auth-header { text-align: center; margin-bottom: 30px; }
    .auth-header h1 { font-size: 32px; margin: 0 0 10px 0; color: #fff; }
    .auth-header h1 span { color: #ff4fa3; }
    .email-sent { background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 12px; padding: 20px; margin-bottom: 30px; text-align: center; }
    .email-sent p { color: #e5e7eb; margin: 5px 0; }
    .email { color: #8b5cf6; font-weight: 600; }
    .code-input { width: 100%; padding: 16px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; font-size: 24px; text-align: center; letter-spacing: 8px; outline: none; font-weight: 600; }
    .code-input:focus { border-color: rgba(139, 92, 246, 0.5); }
    .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #8b5cf6, #7c3aed); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; }
    .resend-section { text-align: center; margin-top: 20px; color: #9aa0a6; font-size: 14px; }
    .resend-btn { background: none; border: none; color: #8b5cf6; cursor: pointer; text-decoration: underline; }
    .message { padding: 12px 16px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
    .message.success { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); color: #22c55e; }
    .message.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Emo<span>Tomo</span></h1>
        <p>Подтверждение Email</p>
      </div>
      <div class="email-sent">
        <p>Мы отправили код на</p>
        <p class="email">{{ email }}</p>
        <p style="font-size: 12px; margin-top: 10px;">Код действителен 15 минут</p>
      </div>
      {% if messages %}
        {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        {% csrf_token %}
        {{ form.code }}
        <button type="submit" class="submit-btn">Подтвердить</button>
      </form>
      <div class="resend-section">
        <p>Не получили код?</p>
        <form method="post" action="{% url 'core:resend_code' %}" style="display:inline;">
          {% csrf_token %}
          <button type="submit" class="resend-btn">Отправить повторно</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    const input = document.querySelector('input[name="code"]');
    if(input) {
      input.addEventListener('input', e => e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6));
      input.focus();
    }
  </script>
</body>
</html>
