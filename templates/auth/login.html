<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - EmoTomo</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f1115;
      color: #fff;
      overflow-x: hidden;
    }

    .aurora {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background:
        radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
    }

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: rgba(18, 20, 28, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px;
      max-width: 450px;
      width: 100%;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h1 {
      font-size: 32px;
      margin: 0 0 10px 0;
      color: #fff;
    }

    .auth-header h1 span {
      color: #ff4fa3;
    }

    .auth-header p {
      color: #94a3b8;
      margin: 0;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #e5e7eb;
      font-size: 14px;
      font-weight: 500;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .form-input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }

    .form-input::placeholder {
      color: #64748b;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      color: #9aa0a6;
      font-size: 14px;
    }

    .auth-footer a {
      color: #8b5cf6;
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .message {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .message.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22c55e;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }

    .guest-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #94a3b8;
      font-size: 14px;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .guest-btn:hover {
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    @media (max-width: 430px) {
      .auth-card {
        padding: 28px 18px;
        border-radius: 18px;
      }
      .auth-card h2 { font-size: 22px; }
    }
    @media (max-width: 375px) {
      .auth-card { padding: 22px 14px; }
    }
    @media (max-width: 320px) {
      .auth-page { padding: 10px; }
      .auth-card { padding: 18px 12px; border-radius: 14px; }
    }
  </style>
</head>

<body>
  <div class="aurora" aria-hidden="true"></div>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Emo<span>Tomo</span></h1>
        <p>Войдите в аккаунт</p>
      </div>

      <div id="msg-container"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">Email или имя пользователя</label>
          <input id="username" type="text" class="form-input" placeholder="you@example.com" required
            autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input id="password" type="password" class="form-input" placeholder="••••••••" required
            autocomplete="current-password">
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">Войти</button>
        <button type="button" class="guest-btn" id="guest-btn">Продолжить без аккаунта</button>
      </form>

      <div class="auth-footer">
        Нет аккаунта? <a href="/auth/register.html">Зарегистрироваться</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const msgContainer = document.getElementById('msg-container');
    const submitBtn = document.getElementById('submit-btn');
    const guestBtn = document.getElementById('guest-btn');

    // If already logged in, redirect
    if (localStorage.getItem('auth_token')) {
      window.location.href = '/catalog.html';
    }

    function showMsg(text, type = 'error') {
      msgContainer.innerHTML = `<div class="message ${type}">${type === 'success' ? '✅' : '⚠️'} ${text}</div>`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) return showMsg('Заполните все поля');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Вход...';

      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username_or_email: username, password }),
        });
        const data = await r.json();

        if (data.access_token) {
          localStorage.setItem('auth_token', data.access_token);
          localStorage.setItem('user_id', data.user?.id || 'anon');
          localStorage.setItem('username', data.user?.username || username);
          showMsg('Добро пожаловать! Перенаправляем...', 'success');
          const redirect = new URLSearchParams(location.search).get('next') || '/catalog.html';
          setTimeout(() => window.location.href = redirect, 1000);
        } else {
          showMsg(data.detail || data.error || 'Неверные данные для входа');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Войти';
        }
      } catch (err) {
        showMsg('Ошибка соединения с сервером');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Войти';
      }
    });

    guestBtn.addEventListener('click', () => {
      localStorage.setItem('user_id', 'anon');
      localStorage.removeItem('auth_token');
      window.location.href = '/catalog.html';
    });
  </script>
</body>

</html>
