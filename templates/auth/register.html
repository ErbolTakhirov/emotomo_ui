<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация - EmoTomo</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f1115;
      color: #fff;
      overflow-x: hidden;
    }

    .aurora {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background:
        radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
    }

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: rgba(20, 22, 30, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header h1 {
      font-size: 36px;
      font-weight: 700;
      margin: 0 0 8px 0;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .auth-header p {
      color: #94a3b8;
      font-size: 15px;
      margin: 0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 500;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .form-input:focus {
      background: rgba(0, 0, 0, 0.5);
      border-color: #8b5cf6;
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
    }

    .form-input::placeholder {
      color: #64748b;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
      font-family: inherit;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      color: #94a3b8;
      font-size: 14px;
    }

    .auth-footer a {
      color: #a78bfa;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .auth-footer a:hover {
      color: #c4b5fd;
      text-decoration: underline;
    }

    .message {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .message.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .help-text {
      color: #64748b;
      font-size: 12px;
      margin-top: 6px;
    }

    @media (max-width: 430px) {
      .auth-card {
        padding: 28px 18px;
        border-radius: 18px;
      }
      .auth-card h2 { font-size: 22px; }
    }
    @media (max-width: 375px) {
      .auth-card { padding: 22px 14px; }
    }
    @media (max-width: 320px) {
      .auth-page { padding: 10px; }
      .auth-card { padding: 18px 12px; border-radius: 14px; }
    }
  </style>
</head>

<body>
  <div class="aurora" aria-hidden="true"></div>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h1>EmoTomo</h1>
        <p>Создайте аккаунт для общения</p>
      </div>

      <div id="msg-container"></div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="username">Имя пользователя</label>
          <input id="username" type="text" class="form-input" placeholder="your_name" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input id="password" type="password" class="form-input" placeholder="••••••••" required
            autocomplete="new-password">
          <div class="help-text">Минимум 4 символа</div>
        </div>
        <div class="form-group">
          <label for="password2">Подтверждение пароля</label>
          <input id="password2" type="password" class="form-input" placeholder="••••••••" required
            autocomplete="new-password">
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">Зарегистрироваться</button>
      </form>

      <div class="auth-footer">
        Уже есть аккаунт? <a href="/auth/login.html">Войти</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('register-form');
    const msgContainer = document.getElementById('msg-container');
    const submitBtn = document.getElementById('submit-btn');

    function showMsg(text, type = 'error') {
      msgContainer.innerHTML = `<div class="message ${type}">${type === 'success' ? '✅' : '⚠️'} ${text}</div>`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;

      if (!username || !email || !password) return showMsg('Заполните все поля');
      if (password !== password2) return showMsg('Пароли не совпадают');
      if (password.length < 4) return showMsg('Пароль слишком короткий');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Регистрация...';

      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        const data = await r.json();

        if (data.access_token) {
          localStorage.setItem('auth_token', data.access_token);
          localStorage.setItem('user_id', data.user?.id || 'anon');
          localStorage.setItem('username', data.user?.username || username);
          showMsg('Аккаунт создан! Перенаправляем...', 'success');
          setTimeout(() => window.location.href = '/catalog.html', 1200);
        } else {
          showMsg(data.detail || data.error || 'Ошибка регистрации');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Зарегистрироваться';
        }
      } catch (err) {
        showMsg('Ошибка соединения с сервером');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Зарегистрироваться';
      }
    });
  </script>
</body>

</html>
